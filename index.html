<!DOCTYPE html>
<html>
<head>
  <title>Shopify Token Generator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-top: 60px;
    }

    .policy {
        max-width: 400px;
        margin: 20px auto;
        font-size: 12px;
        color: #ddd;
        text-align: center;
        line-height: 1.5;
}

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #ddd;
    }

    /* CARD */
    .card {
      backdrop-filter: blur(25px);
      background: rgba(255,255,255,0.12);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      margin-top: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    /* FORM */
    .form-group {
      position: relative;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 14px 12px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 14px;
    }

    label {
      position: absolute;
      left: 12px;
      top: 14px;
      color: #ddd;
      font-size: 13px;
      transition: 0.2s;
      pointer-events: none;
    }

    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 11px;
      color: #fff;
    }

    input::placeholder {
      color: transparent;
    }

    /* PASSWORD */
    .password-box {
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    button:hover {
      transform: translateY(-2px);
    }

    /* RESULT */
    .result {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      word-break: break-all;
      display: none;
    }

    .success {
      background: rgba(0,255,150,0.2);
    }

    .error {
      background: rgba(255,0,0,0.2);
    }

    /* COPY */
    .copy-btn {
      margin-top: 10px;
      background: #28a745;
      display: none;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      background: black;
      padding: 10px 15px;
      border-radius: 8px;
      display: none;
    }

    /* FOOTER */
    .footer {
      margin-top: 40px;
      color: #ccc;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🚀 Shopify Token Generator</h1>
  <p>Generate Admin API access token instantly</p>
</div>

<div class="card">

  <div class="form-group">
    <input id="store" placeholder=" ">
    <label>Store (your-store.myshopify.com)</label>
  </div>

  <div class="form-group">
    <input id="client_id" placeholder=" ">
    <label>Client ID</label>
  </div>

  <div class="form-group password-box">
    <input id="client_secret" type="password" placeholder=" ">
    <label>Client Secret</label>
    <span class="toggle" onclick="togglePassword()">👁️</span>
  </div>

  <button id="btn" onclick="getToken()">Get Token</button>

  <div id="result" class="result"></div>
  <button id="copyBtn" class="copy-btn" onclick="copyToken()">📋 Copy Token</button>

</div>
<div class="policy">
  🔐 <b>Your data is safe.</b><br>
  We do not store or track your store credentials.  
  Everything runs securely and temporarily. No data is saved or shared.
</div>

<div class="footer">
  Built for developers ⚡ | Secure & Fast
</div>

<div id="toast" class="toast">Copied!</div>

<script>
let currentToken = "";

function togglePassword() {
  const input = document.getElementById("client_secret");
  input.type = input.type === "password" ? "text" : "password";
}

async function getToken() {
  const store = document.getElementById("store").value;
  const client_id = document.getElementById("client_id").value;
  const client_secret = document.getElementById("client_secret").value;

  const btn = document.getElementById("btn");
  const resultBox = document.getElementById("result");

  btn.classList.add("loading");
  btn.innerText = "Generating...";

  try {
    const res = await fetch("api/token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ store, client_id, client_secret })
    });

    const data = await res.json();

    resultBox.style.display = "block";

    if (data.success) {
      currentToken = data.token;
      resultBox.className = "result success";
      resultBox.innerText = data.token;
      document.getElementById("copyBtn").style.display = "block";
    } else {
      resultBox.className = "result error";
      resultBox.innerText = "❌ " + JSON.stringify(data.error);
    }

  } catch {
    resultBox.style.display = "block";
    resultBox.className = "result error";
    resultBox.innerText = "❌ Network error";
  }

  btn.classList.remove("loading");
  btn.innerText = "Get Token";
}

function copyToken() {
  navigator.clipboard.writeText(currentToken);
  const toast = document.getElementById("toast");
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 2000);
}
</script>

</body>
</html>
